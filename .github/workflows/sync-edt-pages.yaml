name: Sync EDT-Pages to edt-pages/

on:
  #schedule:
    #- cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      upstream_url:
        description: 'Upstream repository URL'
        required: true
        default: 'https://github.com/EDT-Pages/EDT-Pages.github.io.git'
      branch:
        description: 'Branch to sync'
        required: true
        default: 'main'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    env:
      BRANCH: ${{ github.event.inputs.branch || 'main' }}
      UPSTREAM_URL: ${{ github.event.inputs.upstream_url || 'https://github.com/EDT-Pages/EDT-Pages.github.io.git' }}

    steps:
      - name: Checkout wh1oh.github.io
        uses: actions/checkout@v6.0.2
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set Git identity
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Remove submodule record if exists
        run: |
          if git ls-files --stage edt-pages | grep -q '^160000'; then
            echo "edt-pages is a submodule, removing from index..."
            git rm --cached edt-pages
            rm -f .gitmodules
            git commit -m "chore: remove edt-pages submodule record" || true
          fi

      - name: Clone or pull EDT-Pages into edt-pages/
        run: |
          if [ -d "edt-pages" ]; then
            echo "edt-pages/ exists, pulling latest..."
            cd edt-pages
            git init
            git remote add origin "${UPSTREAM_URL}" 2>/dev/null || git remote set-url origin "${UPSTREAM_URL}"
            git fetch origin "${BRANCH}" --depth=1
            git reset --hard "origin/${BRANCH}"
            rm -rf .git
          else
            echo "edt-pages/ not found, cloning..."
            git clone --depth=1 --branch "${BRANCH}" "${UPSTREAM_URL}" edt-pages
            rm -rf edt-pages/.git
          fi

      - name: Patch edt-pages/admin/index.html
        run: |
          FILE="edt-pages/admin/index.html"
          #perl -i -0pe 's/(<input[^>]*id="portInput"[^>]*value=")0"/${1}443"/' "$FILE"
         # perl -i -0pe 's/(\{ label: "CF官方列表v4")/{ label: "SG个人列表v4", family: "ipv4", url: "https:\/\/raw.githubusercontent.com\/legalishomo\/cc\/refs\/heads\/main\/SG_ip.txt" },\n                    $1/' "$FILE"
          perl -i -0pe 's/(\{ label: "CF官方列表v4")/{ label: "US个人列表v4", family: "ipv4", url: "https:\/\/raw.githubusercontent.com\/legalishomo\/cc\/refs\/heads\/main\/US_ip.txt" },\n                    $1/' "$FILE"
          perl -i -0pe 's/(id="limitInput"[^>]*?)value="512"/\1value="4096"/' "$FILE"

      - name: Commit and push changes
        run: |
          git add edt-pages/

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: sync EDT-Pages $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push origin main
          fi

      - name: Summary
        if: always()
        run: |
          echo "### Sync Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "| --- | --- |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | ${BRANCH} |" >> $GITHUB_STEP_SUMMARY
          echo "| Upstream URL | ${UPSTREAM_URL} |" >> $GITHUB_STEP_SUMMARY

name: Sync EDT-Pages to edt-pages/

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      upstream_url:
        description: 'Upstream repository URL'
        required: true
        default: 'https://github.com/EDT-Pages/EDT-Pages.github.io.git'
      branch:
        description: 'Branch to sync'
        required: true
        default: 'main'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    env:
      BRANCH: ${{ github.event.inputs.branch || 'main' }}
      UPSTREAM_URL: ${{ github.event.inputs.upstream_url || 'https://github.com/EDT-Pages/EDT-Pages.github.io.git' }}

    steps:
      - name: Checkout wh1oh.github.io
        uses: actions/checkout@v6.0.2
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set Git identity
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Clone or pull EDT-Pages into edt-pages/
        run: |
          if [ ! -d "edt-pages" ]; then
            echo "edt-pages/ not found, cloning..."
            git clone --branch "${BRANCH}" "${UPSTREAM_URL}" edt-pages
            # 删掉内层 .git，避免被识别为 submodule
            rm -rf edt-pages/.git
          else
            echo "edt-pages/ exists, pulling latest..."
            cd edt-pages
            git pull -X theirs origin "${BRANCH}"
            # pull 完再删掉 .git
            rm -rf .git
          fi

      - name: Patch edt-pages/admin/index.html
        run: |
          FILE="edt-pages/admin/index.html"

          perl -i -0pe 's/(\{ label: "CF官方列表v4")/{ label: "个人列表v4", family: "ipv4", url: "https:\/\/raw.githubusercontent.com\/legalishomo\/cc\/refs\/heads\/main\/US_ip.txt" },\n                    $1/' "$FILE"

          perl -i -0pe 's/(id="limitInput"[^>]*?)value="512"/\1value="4096"/' "$FILE"

      - name: Commit and push changes
        run: |
          git add edt-pages/

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: sync EDT-Pages $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push origin main
          fi

      - name: Summary
        if: always()
        run: |
          echo "### Sync Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "| --- | --- |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | ${BRANCH} |" >> $GITHUB_STEP_SUMMARY
          echo "| Upstream URL | ${UPSTREAM_URL} |" >> $GITHUB_STEP_SUMMARY
